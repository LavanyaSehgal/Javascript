<!DOCTYPE html>
<html>
<body>

<input type="number" id="num">
<button onclick="sumN()">Find Sum</button>

<p id="result"></p>

<script>
function sumN() {
    let n = parseInt(document.getElementById("num").value);
    let sum = 0;

    for(let i=1;i<=n;i++)
        sum += i;

    document.getElementById("result").innerHTML = sum;
}
</script>

</body>
</html>
